<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snippet School | Master Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b1120; color: #94a3b8; overflow-x: hidden; }
        
        /* Glassmorphism & Effects */
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-blur: 12px; }
        .active-folder { 
            background: linear-gradient(to right, rgba(59, 130, 246, 0.2), transparent); 
            color: #60a5fa !important; 
            border-left: 4px solid #3b82f6; 
        }
        .active-folder-mobile {
            background: #3b82f6 !important;
            color: white !important;
            transform: translateY(-5px);
        }
        .tag-active { background: #3b82f6 !important; color: white !important; }
        
        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Syntax Highlighting Simplicity */
        pre { tab-size: 4; line-height: 1.5; }
        code { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-20 lg:pb-0">

    <nav class="border-b border-slate-800 p-4 glass sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <span class="text-white font-black text-xs">S</span>
                </div>
                <h1 class="text-lg font-black text-white italic uppercase tracking-tighter lg:block hidden">
                    Snippet<span class="text-blue-500">School</span>
                </h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="statusIndicator" class="text-[9px] font-bold px-3 py-1 rounded-full border border-slate-700 bg-slate-800 flex items-center gap-2">
                    <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                    <span id="statusText" class="hidden sm:inline">READY</span>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex flex-1 max-w-[1600px] mx-auto w-full">
        <aside class="w-64 border-r border-slate-800 hidden lg:flex flex-col py-6 overflow-y-auto sticky top-20 h-[calc(100vh-80px)]" id="sidebarMenu">
            <p class="px-8 text-blue-500 text-[10px] font-black mb-4 uppercase italic tracking-widest">Master Category</p>
            <div id="folderList" class="flex flex-col"></div>
        </aside>

        <main class="flex-1 p-4 lg:p-10 w-full overflow-x-hidden">
            <div class="mb-8 flex flex-col lg:flex-row lg:items-end justify-between gap-6">
                <div class="space-y-1">
                    <p id="breadcrumb" class="text-blue-500 font-mono text-[10px] font-bold uppercase tracking-widest">System / Laravel-React</p>
                    <h2 id="currentTitle" class="text-4xl font-black text-white italic uppercase tracking-tighter">Dashboard</h2>
                </div>
                
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="text-slate-500 text-sm">🔍</span>
                    </div>
                    <input type="text" id="searchInput" placeholder="Search logic or c:code..." 
                        class="bg-[#161e31] border border-slate-800 rounded-2xl pl-12 pr-5 py-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 w-full lg:w-96 transition-all shadow-2xl">
                </div>
            </div>

            <div id="categoryCloud" class="flex overflow-x-auto gap-2 mb-8 pb-2 no-scrollbar scroll-smooth"></div>
            
            <div class="bg-[#111827]/50 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl backdrop-blur-sm">
                <table class="w-full text-left border-collapse">
                    <tbody id="dataTable" class="divide-y divide-slate-800/50">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="lg:hidden fixed bottom-0 left-0 right-0 glass border-t border-slate-800 px-4 py-3 z-50 flex items-center justify-center">
        <div id="mobileNav" class="flex gap-4 overflow-x-auto no-scrollbar w-full max-w-md"></div>
    </div>

    <div id="codeModal" class="fixed inset-0 z-[60] hidden flex items-end lg:items-center justify-center p-0 lg:p-4 bg-black/90 backdrop-blur-sm transition-all" onclick="closeModal()">
        <div class="bg-[#0f172a] w-full max-w-5xl rounded-t-[2.5rem] lg:rounded-3xl border-t lg:border border-slate-800 p-6 lg:p-10 max-h-[95vh] overflow-y-auto shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span id="mId" class="text-blue-500 font-mono text-[11px] font-bold tracking-tighter"></span>
                    <h3 id="mTitle" class="text-2xl lg:text-3xl font-black text-white italic uppercase leading-none mt-1"></h3>
                </div>
                <button onclick="closeModal()" class="bg-slate-800 hover:bg-slate-700 text-white w-10 h-10 rounded-full flex items-center justify-center transition">&times;</button>
            </div>
            
            <div class="bg-slate-900/50 rounded-2xl p-4 mb-6 border border-slate-800">
                <p class="text-blue-400 text-[10px] font-black uppercase mb-1">Analogy & Explanation</p>
                <p id="mDesc" class="text-slate-300 text-sm lg:text-base italic leading-relaxed"></p>
            </div>

            <div class="bg-[#011627] p-4 lg:p-8 rounded-2xl border border-slate-800 relative group">
                <button onclick="copyCode()" class="absolute top-4 right-4 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition active:scale-95 z-10">COPY CODE</button>
                <pre id="mCode" class="text-blue-300 text-[12px] lg:text-[14px] font-mono overflow-x-auto"></pre>
            </div>
        </div>
    </div>

    <div id="customToast" class="fixed top-24 left-1/2 -translate-x-1/2 z-[100] hidden">
        <div class="bg-blue-600 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-blue-400/30 animate-bounce">
            <span class="font-black text-sm uppercase tracking-widest">Code Copied! 🚀</span>
        </div>
    </div>

    <script>
        // -- CONFIGURATION & ALL CATEGORIES --
        const categories = ["migration", "model", "controller", "service", "middleware", "router", "react", "seeder", "tailwind", "setup"];
        
        let allData = []; 
        let currentViewData = [];
        let activeTag = null;

        // 1. Render Navigation (Mobile & Desktop)
        function initNavigation() {
            const side = document.getElementById('folderList');
            const mob = document.getElementById('mobileNav');
            
            const sideHtml = categories.map(f => `
                <button onclick="changeFolder('${f}')" id="side-${f}" class="folder-btn px-8 py-4 text-sm font-bold uppercase tracking-widest text-left transition-all hover:bg-slate-800/50">
                    ${f}
                </button>
            `).join('');

            const mobHtml = categories.map(f => `
                <button onclick="changeFolder('${f}')" id="mob-${f}" class="folder-btn-mob flex-shrink-0 px-6 py-2 rounded-full bg-slate-800 text-[10px] font-bold uppercase border border-slate-700 transition-all">
                    ${f}
                </button>
            `).join('');

            side.innerHTML = sideHtml;
            mob.innerHTML = mobHtml;
        }

        // 2. Load Data from JSON
        async function changeFolder(folder) {
            updateStatus('FETCHING', 'yellow');
            document.getElementById('currentTitle').innerText = folder;
            
            // Highlight Buttons
            document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active-folder'));
            document.querySelectorAll('.folder-btn-mob').forEach(b => b.classList.remove('active-folder-mobile'));
            document.getElementById(`side-${folder}`)?.classList.add('active-folder');
            document.getElementById(`mob-${folder}`)?.classList.add('active-folder-mobile');

            try {
                const response = await fetch(`./data/laravel-react/${folder}/data_kode.json`);
                const data = await response.json();
                
                // Process & Flatten
                currentViewData = data.map(item => ({ ...item, category: folder }));
                allData = currentViewData; // Reset search pool to current folder
                
                renderTable(allData);
                renderTagCloud(allData);
                updateStatus('ONLINE', 'green');
            } catch (err) {
                updateStatus('OFFLINE', 'red');
                console.error(err);
            }
        }

        // 3. Search Engine (Metadata & Code Prefix)
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderTable(allData);
                return;
            }

            const isCodeSearch = query.startsWith('c:');
            const cleanQuery = isCodeSearch ? query.replace('c:', '') : query;
            const keywords = cleanQuery.split(/\s+/);

            const filtered = allData.filter(item => {
                const searchIn = isCodeSearch ? 
                    [item.code] : 
                    [item.title, item.description, item.category, ...(item.categories || [])];

                return keywords.every(kw => 
                    searchIn.some(field => String(field).toLowerCase().includes(kw))
                );
            });

            renderTable(filtered);
        }

        // 4. Render Table
        function renderTable(data) {
            const tbody = document.getElementById('dataTable');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td class="p-20 text-center italic text-slate-600">No snippets found in this category.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(i => `
                <tr class="group cursor-pointer hover:bg-blue-600/5 transition-all border-b border-slate-800/30" onclick="openModal('${i.id}')">
                    <td class="p-5 lg:p-8">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="bg-blue-600/10 text-blue-500 text-[10px] font-mono font-bold px-2 py-0.5 rounded">#${i.id}</span>
                            <h4 class="text-white font-bold uppercase italic tracking-tight group-hover:text-blue-400 transition-colors">${i.title}</h4>
                        </div>
                        <p class="text-xs text-slate-500 italic line-clamp-1">${i.description}</p>
                    </td>
                    <td class="p-5 lg:p-8 text-right hidden sm:table-cell">
                        <span class="text-[10px] font-black text-slate-700 uppercase group-hover:text-blue-500 transition-all italic">Show Logic &rsaquo;</span>
                    </td>
                </tr>
            `).join('');
        }

        // 5. Tag Cloud
        function renderTagCloud(data) {
            const tags = new Set();
            data.forEach(i => i.categories?.forEach(t => tags.add(t)));
            const container = document.getElementById('categoryCloud');
            
            if(tags.size === 0) { container.innerHTML = ''; return; }

            container.innerHTML = Array.from(tags).map(t => `
                <button onclick="filterByTag('${t}')" id="tag-${t}" class="tag-btn flex-shrink-0 px-4 py-2 rounded-xl bg-slate-900 border border-slate-800 text-[10px] font-bold uppercase tracking-tighter hover:border-blue-500 transition-all">
                    #${t}
                </button>
            `).join('');
        }

        function filterByTag(tag) {
            activeTag = (activeTag === tag) ? null : tag;
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('tag-active'));
            
            if (activeTag) {
                document.getElementById(`tag-${tag}`).classList.add('tag-active');
                const filtered = allData.filter(i => i.categories?.includes(tag));
                renderTable(filtered);
            } else {
                renderTable(allData);
            }
        }

        // UI Helpers
        function openModal(id) {
            const item = allData.find(x => x.id === id);
            if(!item) return;

            document.getElementById('mId').innerText = `SNIPPET // ${item.category.toUpperCase()} // ${item.id}`;
            document.getElementById('mTitle').innerText = item.title;
            document.getElementById('mDesc').innerText = item.description;
            document.getElementById('mCode').textContent = item.code;
            
            document.getElementById('codeModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('codeModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function copyCode() {
            const code = document.getElementById('mCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                const toast = document.getElementById('customToast');
                toast.classList.remove('hidden');
                setTimeout(() => toast.classList.add('hidden'), 2000);
            });
        }

        function updateStatus(text, color) {
            const colors = { green: 'bg-green-500', yellow: 'bg-yellow-500', red: 'bg-red-500' };
            document.getElementById('statusText').innerText = text;
            document.getElementById('statusDot').className = `w-2 h-2 rounded-full ${colors[color]} shadow-[0_0_10px_rgba(0,0,0,0.5)]`;
        }

        // Init
        document.getElementById('searchInput').addEventListener('input', handleSearch);
        window.onload = () => {
            initNavigation();
            changeFolder('controller'); // Default folder
        };
    </script>
</body>
</html>
