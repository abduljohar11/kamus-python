<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snippet School | Mobile Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b1120; color: #94a3b8; overflow-x: hidden; }
        .active-folder { background: rgba(59, 130, 246, 0.2) !important; color: #60a5fa !important; border-bottom: 3px solid #3b82f6; }
        .tag-active { background: #3b82f6 !important; color: white !important; }
        /* Custom Scrollbar for Code */
        pre::-webkit-scrollbar { height: 4px; }
        pre::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        /* Bottom Nav shadow */
        .nav-shadow { box-shadow: 0 -10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-20 lg:pb-0">
    <nav class="border-b border-slate-800 p-4 bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <h1 class="text-lg font-black text-white italic uppercase tracking-tighter">Snippet<span class="text-blue-500">School</span></h1>
            <div id="statusIndicator" class="text-[9px] font-bold px-3 py-1 rounded-full border border-slate-700 bg-slate-800 flex items-center gap-2">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                <span id="statusText">READY</span>
            </div>
        </div>
    </nav>

    <div class="flex flex-1 max-w-[1600px] mx-auto w-full">
        <aside class="w-64 border-r border-slate-800 hidden lg:flex flex-col py-6 overflow-y-auto" id="sidebarMenu"></aside>

        <main class="flex-1 p-4 lg:p-12 w-full overflow-x-hidden">
            <div class="mb-6 flex flex-col gap-4">
                <div>
                    <p id="breadcrumb" class="text-blue-500 font-mono text-[9px] font-bold uppercase tracking-widest">System / Laravel</p>
                    <h2 id="currentTitle" class="text-3xl font-black text-white italic uppercase tracking-tighter">Welcome</h2>
                </div>
                <input type="text" id="searchInput" placeholder="Search logic..." class="bg-[#161e31] border border-slate-800 rounded-xl px-5 py-3 text-sm text-white focus:outline-none focus:border-blue-500 w-full lg:w-80 shadow-inner">
            </div>

            <div id="categoryCloud" class="flex overflow-x-auto gap-2 mb-6 pb-2 no-scrollbar"></div>
            
            <div class="bg-[#111827] rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
                <table class="w-full text-left">
                    <tbody id="dataTable" class="divide-y divide-slate-800/50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-[#0f172a] border-t border-slate-800 px-2 py-1 z-50 nav-shadow flex overflow-x-auto no-scrollbar justify-between">
        <div id="mobileNav" class="flex w-full"></div>
    </div>

    <div id="codeModal" class="fixed inset-0 z-[60] hidden flex items-end lg:items-center justify-center p-0 lg:p-4 bg-black/90 backdrop-blur-sm" onclick="closeModal()">
        <div class="bg-[#111827] w-full max-w-4xl rounded-t-[2rem] lg:rounded-3xl border-t lg:border border-slate-800 p-6 lg:p-8 max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span id="mId" class="text-blue-500 font-mono text-[10px] font-bold"></span>
                    <h3 id="mTitle" class="text-xl lg:text-2xl font-black text-white italic uppercase"></h3>
                </div>
                <button onclick="closeModal()" class="text-slate-500 text-3xl p-2">&times;</button>
            </div>
            <p id="mDesc" class="text-slate-400 text-xs lg:text-sm mb-6 italic border-l-2 border-blue-500 pl-4"></p>
            <div class="bg-black p-4 lg:p-6 rounded-xl border border-slate-800 relative">
                <button onclick="copyCode()" class="absolute top-2 right-2 text-[9px] bg-blue-600 text-white px-3 py-1 rounded-md font-bold uppercase tracking-widest active:scale-95 transition">COPY</button>
                <pre id="mCode" class="text-blue-400 text-[11px] lg:text-sm font-mono overflow-x-auto whitespace-pre-wrap lg:whitespace-pre"></pre>
            </div>
        </div>
    </div>

    <div id="customToast" class="fixed top-20 left-1/2 -translate-x-1/2 z-[100] hidden transition-all duration-500 transform -translate-y-10 opacity-0">
        <div class="bg-blue-600 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 border border-white/20 backdrop-blur-md">
            <span class="font-black text-xs uppercase tracking-tighter">✅ Copied to Clipboard</span>
        </div>
    </div>

    <script>
        window.onerror = (m) => {
            document.getElementById('dataTable').innerHTML = `<tr><td class="p-10 text-center text-red-500 text-xs">🚨 ERR: ${m}</td></tr>`;
        };

        let fullData = [], activeTag = null;
        const cfg = ["migration","model","controller","service","middleware","router","react","seeder"];

        function renderNavigation() {
            const side = document.getElementById('sidebarMenu');
            const mob = document.getElementById('mobileNav');
            
            const buttons = cfg.map(f => `
                <button onclick="loadData('${f}')" id="btn-${f}" class="folder-btn flex-shrink-0 px-5 py-3 text-[10px] lg:text-sm font-bold uppercase tracking-wider transition-all">
                    ${f}
                </button>
            `).join('');

            side.innerHTML = `<p class="px-8 text-blue-500 text-[10px] font-black mb-4 uppercase italic">Folders</p>` + buttons;
            mob.innerHTML = buttons;
        }

        async function loadData(f) {
            updateStatus('SYNCING', 'yellow');
            document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active-folder'));
            document.querySelectorAll(`[id="btn-${f}"]`).forEach(b => b.classList.add('active-folder'));
            
            document.getElementById('currentTitle').innerText = f;
            document.getElementById('dataTable').innerHTML = `<tr><td class="p-16 text-center animate-pulse text-blue-500 text-xs font-bold uppercase tracking-widest">Loading Repository...</td></tr>`;
            
            try {
                const r = await fetch(`./data/laravel-react/${f}/data_kode.json?t=${Date.now()}`);
                if(!r.ok) throw new Error(`Not Found`);
                fullData = await r.json();
                renderUI(fullData);
                renderTags(fullData);
                updateStatus('ONLINE', 'green');
            } catch (e) {
                updateStatus('ERROR', 'red');
                document.getElementById('dataTable').innerHTML = `<tr><td class="p-10 text-center text-red-400 text-xs uppercase font-bold">${e.message}</td></tr>`;
            }
        }

        function renderUI(d) {
            const container = document.getElementById('dataTable');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = d.filter(i => {
                const matchSearch = (i.title+i.description+i.id).toLowerCase().includes(search);
                const matchTag = !activeTag || (i.categories && i.categories.includes(activeTag));
                return matchSearch && matchTag;
            });

            container.innerHTML = filtered.map(i => `
                <tr class="hover:bg-blue-600/5 active:bg-blue-600/10 transition" onclick="openModal('${i.id}')">
                    <td class="p-4 lg:p-6">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-blue-500 font-mono text-[9px] font-bold">#${i.id}</span>
                            <div class="text-white font-bold italic uppercase text-sm lg:text-base">${i.title}</div>
                        </div>
                        <div class="text-[10px] lg:text-xs text-slate-500 line-clamp-1 italic">${i.description}</div>
                    </td>
                    <td class="p-4 lg:p-6 text-right">
                        <div class="text-blue-500 font-black text-[10px]">OPEN &rsaquo;</div>
                    </td>
                </tr>`).join('');
        }

        function renderTags(d) {
            const tags = new Set();
            d.forEach(i => i.categories?.forEach(t => tags.add(t)));
            document.getElementById('categoryCloud').innerHTML = Array.from(tags).map(t => `
                <button onclick="filterTag('${t}')" id="tag-${t}" class="tag-btn flex-shrink-0 px-3 py-1.5 rounded-lg bg-slate-900 border border-slate-800 text-[9px] font-bold uppercase tracking-tighter">#${t}</button>
            `).join('');
        }

        function filterTag(t) {
            activeTag = (activeTag === t) ? null : t;
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('tag-active'));
            if(activeTag) document.getElementById(`tag-${t}`).classList.add('tag-active');
            renderUI(fullData);
        }

        function openModal(id) {
            const i = fullData.find(x => x.id === id);
            if(!i) return;
            document.getElementById('mId').innerText = `ID: ${i.id}`;
            document.getElementById('mTitle').innerText = i.title;
            document.getElementById('mDesc').innerText = i.description;
            document.getElementById('mCode').textContent = i.code;
            document.getElementById('codeModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { 
            document.getElementById('codeModal').classList.add('hidden'); 
            document.body.style.overflow = 'auto';
        }

        function showToast(msg) {
            const t = document.getElementById('customToast');
            t.classList.remove('hidden');
            setTimeout(() => t.classList.remove('-translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                t.classList.add('-translate-y-10', 'opacity-0');
                setTimeout(() => t.classList.add('hidden'), 500);
            }, 2000);
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('mCode').textContent).then(() => showToast());
        }

        function updateStatus(t, c) {
            const cls = {green:'bg-green-500', yellow:'bg-yellow-500', red:'bg-red-500'};
            document.getElementById('statusText').innerText = t;
            document.getElementById('statusDot').className = `w-2 h-2 rounded-full ${cls[c]} shadow-[0_0_8px_${c}]`;
        }

        document.getElementById('searchInput').addEventListener('input', () => renderUI(fullData));
        window.onload = () => { renderNavigation(); loadData('controller'); };
    </script>
</body>
</html>
